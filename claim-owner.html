<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkord Owner Token Claimer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .token-box {
            background: #f5f5f5;
            border: 2px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            color: #333;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover {
            background: #5568d3;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Sharkord Owner Setup</h1>
        <p class="subtitle">Automatisch Owner-Rechte claimem</p>
        
        <p style="color:#666, text-align: left; margin: 20px 0;">
            Klicke auf "Owner Rechte Claimem" – das öffnet Sharkord in einem neuen Tab 
            und registriert dein Token automatisch.
        </p>
        
        <div class="token-box" id="tokenBox">
            019c9bd0-2d07-7000-a14c-1570ae374b0a
        </div>
        
        <button class="btn" onclick="claimOwner()" id="claimBtn">
            🚀 Owner Rechte Claimem
        </button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const TOKEN = "019c9bd0-2d07-7000-a14c-1570ae374b0a";
        const SHARKORD_URL = "http://localhost:3000";
        
        async function claimOwner() {
            const btn = document.getElementById("claimBtn");
            const status = document.getElementById("status");
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Wird geladen...';
            status.innerHTML = '';
            status.className = 'status info';
            status.innerHTML = '⏳ Öffne Sharkord...';
            
            try {
                // Öffne Sharkord in neuem Tab
                const sharkordWindow = window.open(SHARKORD_URL, 'sharkord');
                
                if (!sharkordWindow) {
                    throw new Error('Popup wurde blockiert. Bitte erlaube Popups für diese Seite.');
                }
                
                // Warte 2 Sekunden bis Sharkord geladen ist
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Injiziere den Token-Claim Code
                const claimScript = `
                    try {
                        if (typeof useToken === 'function') {
                            useToken("${TOKEN}");
                            window.location.reload();
                        } else {
                            console.error('useToken nicht gefunden');
                        }
                    } catch (e) {
                        console.error('Fehler beim Token-Claim:', e);
                    }
                `;
                
                // Versuche, den Code via postMessage zu injizieren
                sharkordWindow.postMessage({
                    action: 'claim-token',
                    token: TOKEN
                }, SHARKORD_URL);
                
                // Fallback: Zeige manuelle Anweisungen
                setTimeout(() => {
                    status.className = 'status info';
                    status.innerHTML = `
                        <strong>ℹ️ Sharkord ist jetzt offen</strong><br><br>
                        Falls nicht automatisch registriert:<br>
                        1. Öffne DevTools (CTRL + SHIFT + I)<br>
                        2. Gehe zur Console-Tab<br>
                        3. Kopiere und füge ein:<br>
                        <code style="background:#f0f0f0; padding:5px; display:block; margin:10px 0;">
                        useToken("${TOKEN}")
                        </code>
                        4. Drücke Enter<br><br>
                        ✅ Das wars – Owner-Rechte sind jetzt aktiv!
                    `;
                    btn.disabled = false;
                    btn.innerHTML = '🚀 Erneut versuchen';
                }, 3000);
                
                status.className = 'status success';
                status.innerHTML = '✅ Sharkord geöffnet! Token wird registriert...';
                
            } catch (error) {
                status.className = 'status error';
                status.innerHTML = `❌ Fehler: ${error.message}`;
                btn.disabled = false;
                btn.innerHTML = '🚀 Owner Rechte Claimem';
            }
        }
        
        // Auto-claim wenn die Seite in einem Sharkord-iframe geladen wird
        window.addEventListener('message', (event) => {
            if (event.data.action === 'claim-token' && typeof useToken === 'function') {
                useToken(event.data.token);
            }
        });
    </script>
</body>
</html>
